<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 280" width="1280" height="280"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Ibrar Ahmad — Biosensor &amp; embedded engineer">

  <title>Ibrar Ahmad — Biosensor &amp; embedded engineer</title>

  <defs>
    <!-- Single, very subtle background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#05070b"/>
    </linearGradient>

    <!-- Faint horizon line gradient -->
    <linearGradient id="hairline" x1="0" x2="1">
      <stop offset="0%"  stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <!-- The single moving accent: a slow pulse that travels under the name -->
    <linearGradient id="pulseAccent" x1="0" x2="1">
      <stop offset="0%"  stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="45%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="1"/>
      <stop offset="55%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
      <animate attributeName="x1" values="-1;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="280" fill="url(#bg)"/>

  <!-- Top hairline -->
  <line x1="0" y1="0.5" x2="1280" y2="0.5" stroke="url(#hairline)" stroke-width="1"/>

  <!-- Top-left meta -->
  <g font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="11" fill="#5b6677">
    <text x="64" y="44" letter-spacing="3">PORTFOLIO · 001</text>
  </g>

  <!-- Top-right meta -->
  <g font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="11" fill="#5b6677" text-anchor="end">
    <text x="1216" y="44" letter-spacing="3">ISLAMABAD / PK</text>
  </g>

  <!-- The name. Big, confident, generous letter-spacing, single weight. -->
  <text x="64" y="160"
        font-family="Inter, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-weight="700" font-size="84" fill="#f5f7fa" letter-spacing="-2">Ibrar Ahmad</text>

  <!-- One quiet underline that pulses (the ONE accent) -->
  <rect x="64" y="180" width="180" height="1.5" fill="#3b82f6"/>
  <rect x="64" y="180" width="180" height="1.5" fill="url(#pulseAccent)"/>

  <!-- Role line. One sentence. -->
  <text x="64" y="216"
        font-family="Inter, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-weight="400" font-size="18" fill="#9aa4b2">
    Biosensor &amp; embedded engineer — designing the analog front-end, the PCB, and the firmware.
  </text>

  <!-- Bottom hairline -->
  <line x1="0" y1="279.5" x2="1280" y2="279.5" stroke="url(#hairline)" stroke-width="1"/>

  <!-- Tiny right-side anchor block -->
  <g font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="11" fill="#5b6677">
    <text x="1216" y="200" text-anchor="end" letter-spacing="2">EEG · PCB · FIRMWARE</text>
    <text x="1216" y="218" text-anchor="end" letter-spacing="2" fill="#3b82f6">github.com/hiibrarahmad</text>
  </g>
</svg>

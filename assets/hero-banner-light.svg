<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 280" width="1280" height="280"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Ibrar Ahmad — Biosensor &amp; embedded engineer">

  <title>Ibrar Ahmad — Biosensor &amp; embedded engineer</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfcfe"/>
      <stop offset="100%" stop-color="#f3f5f9"/>
    </linearGradient>

    <linearGradient id="hairline" x1="0" x2="1">
      <stop offset="0%"  stop-color="#1d4ed8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1d4ed8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="pulseAccent" x1="0" x2="1">
      <stop offset="0%"  stop-color="#1d4ed8" stop-opacity="0"/>
      <stop offset="45%" stop-color="#1d4ed8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="55%" stop-color="#1d4ed8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
      <animate attributeName="x1" values="-1;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="280" fill="url(#bg)"/>
  <line x1="0" y1="0.5" x2="1280" y2="0.5" stroke="url(#hairline)" stroke-width="1"/>

  <g font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="11" fill="#64748b">
    <text x="64" y="44" letter-spacing="3">PORTFOLIO · 001</text>
  </g>

  <g font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="11" fill="#64748b" text-anchor="end">
    <text x="1216" y="44" letter-spacing="3">ISLAMABAD / PK</text>
  </g>

  <text x="64" y="160"
        font-family="Inter, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-weight="700" font-size="84" fill="#0f172a" letter-spacing="-2">Ibrar Ahmad</text>

  <rect x="64" y="180" width="180" height="1.5" fill="#1d4ed8"/>
  <rect x="64" y="180" width="180" height="1.5" fill="url(#pulseAccent)"/>

  <text x="64" y="216"
        font-family="Inter, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-weight="400" font-size="18" fill="#475569">
    Biosensor &amp; embedded engineer — designing the analog front-end, the PCB, and the firmware.
  </text>

  <line x1="0" y1="279.5" x2="1280" y2="279.5" stroke="url(#hairline)" stroke-width="1"/>

  <g font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="11" fill="#64748b">
    <text x="1216" y="200" text-anchor="end" letter-spacing="2">EEG · PCB · FIRMWARE</text>
    <text x="1216" y="218" text-anchor="end" letter-spacing="2" fill="#1d4ed8">github.com/hiibrarahmad</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 440" width="1280" height="440"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Ibrar Ahmad — Embedded · Biosensor · PCB Signal Integrity">

  <title>Ibrar Ahmad — Embedded · Biosensor · PCB Signal Integrity</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f6f9ff"/>
      <stop offset="50%"  stop-color="#ecf3ff"/>
      <stop offset="100%" stop-color="#dceaff"/>
    </linearGradient>

    <radialGradient id="haze" cx="50%" cy="55%" r="75%">
      <stop offset="0%"   stop-color="#0099ff" stop-opacity="0.10"/>
      <stop offset="60%"  stop-color="#7c4dff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="holoTitle" x1="0" y1="0" x2="1" y2="0.4" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#d4007a"/>
      <stop offset="20%"  stop-color="#ff6a00"/>
      <stop offset="40%"  stop-color="#c9a200"/>
      <stop offset="55%"  stop-color="#009b7d"/>
      <stop offset="72%"  stop-color="#0077c8"/>
      <stop offset="100%" stop-color="#5e2bb4"/>
      <animate attributeName="x1" values="0;1;0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;2;1" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="alphaG" x1="0" x2="1">
      <stop offset="0"  stop-color="#0077c8" stop-opacity="0"/>
      <stop offset=".5" stop-color="#0077c8"/>
      <stop offset="1"  stop-color="#0077c8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="betaG" x1="0" x2="1">
      <stop offset="0"  stop-color="#7c4dff" stop-opacity="0"/>
      <stop offset=".5" stop-color="#7c4dff"/>
      <stop offset="1"  stop-color="#7c4dff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gammaG" x1="0" x2="1">
      <stop offset="0"  stop-color="#b8860b" stop-opacity="0"/>
      <stop offset=".5" stop-color="#b8860b"/>
      <stop offset="1"  stop-color="#b8860b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="thetaG" x1="0" x2="1">
      <stop offset="0"  stop-color="#009b7d" stop-opacity="0"/>
      <stop offset=".5" stop-color="#009b7d"/>
      <stop offset="1"  stop-color="#009b7d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweepBar" x1="0" x2="1">
      <stop offset="0"   stop-color="#0077c8" stop-opacity="0"/>
      <stop offset=".5"  stop-color="#0077c8" stop-opacity="0.18"/>
      <stop offset="1"   stop-color="#0077c8" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0077c8" stroke-opacity="0.06"/>
    </pattern>

    <path id="trace1" d="M 0 360 L 200 360 L 240 320 L 520 320 L 560 280 L 820 280 L 860 320 L 1080 320 L 1120 360 L 1280 360" fill="none"/>
    <path id="trace2" d="M 0 400 L 280 400 L 320 380 L 600 380 L 640 400 L 940 400 L 980 380 L 1280 380" fill="none"/>
    <path id="trace3" d="M 0 60  L 240 60  L 280 90  L 540 90  L 580 60  L 840 60  L 880 90  L 1280 90"  fill="none"/>

    <path id="alphaWave"
      d="M 0 0 Q 12 -14 24 0 T 48 0 Q 60 -16 72 0 T 96 0 Q 108 -14 120 0 T 144 0
         Q 156 -16 168 0 T 192 0 Q 204 -14 216 0 T 240 0 Q 252 -16 264 0 T 288 0
         Q 300 -14 312 0 T 336 0 Q 348 -16 360 0 T 384 0 Q 396 -14 408 0 T 432 0
         Q 444 -14 456 0" fill="none"/>

    <path id="betaWave"
      d="M 0 0 q 4 -8 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0
         t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0
         t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0
         t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0
         t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0
         t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0
         t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0" fill="none"/>

    <path id="thetaWave"
      d="M 0 0 Q 20 -22 40 0  T 80 0
         Q 100 -22 120 0 T 160 0
         Q 180 -22 200 0 T 240 0
         Q 260 -22 280 0 T 320 0
         Q 340 -22 360 0 T 400 0
         Q 420 -22 440 0 T 456 0" fill="none"/>

    <path id="gammaWave"
      d="M 0 0 q 2 -5 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0
         t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0 t 4 0" fill="none"/>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#grid)"/>
  <rect width="1280" height="440" fill="url(#haze)"/>

  <use xlink:href="#trace1" stroke="#0077c8" stroke-opacity="0.4" stroke-width="2"/>
  <use xlink:href="#trace2" stroke="#005ea3" stroke-opacity="0.3" stroke-width="2"/>
  <use xlink:href="#trace3" stroke="#7c4dff" stroke-opacity="0.3" stroke-width="2"/>

  <circle r="4" fill="#0077c8" filter="url(#glow)">
    <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#trace1"/>
    </animateMotion>
  </circle>
  <circle r="4" fill="#0077c8" filter="url(#glow)">
    <animateMotion dur="4s" repeatCount="indefinite" rotate="auto" begin="2s">
      <mpath xlink:href="#trace1"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#009b7d" filter="url(#glow)">
    <animateMotion dur="5.2s" repeatCount="indefinite" rotate="auto" begin="0.8s">
      <mpath xlink:href="#trace2"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#7c4dff" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" rotate="auto" begin="1.5s">
      <mpath xlink:href="#trace3"/>
    </animateMotion>
  </circle>

  <g fill="#0077c8" opacity="0.6">
    <circle cx="200" cy="360" r="4"/>
    <circle cx="520" cy="320" r="4"/>
    <circle cx="820" cy="280" r="4"/>
    <circle cx="1080" cy="320" r="4"/>
  </g>

  <!-- MCU chip -->
  <g transform="translate(900 170)">
    <rect x="0" y="0" width="240" height="160" rx="8"
          fill="#ffffff" stroke="#0077c8" stroke-opacity="0.7" stroke-width="1.6" filter="url(#glow)"/>
    <text x="120" y="22" text-anchor="middle"
          font-family="JetBrains Mono, Consolas, Menlo, monospace"
          font-size="11" fill="#005ea3" letter-spacing="2">IBRAR · MCU</text>
    <text x="120" y="148" text-anchor="middle"
          font-family="JetBrains Mono, Consolas, Menlo, monospace"
          font-size="8" fill="#0077c8" opacity="0.8">ARM Cortex-M · 16-CH EEG ADC</text>

    <circle cx="120" cy="80" r="6" fill="#0077c8">
      <animate attributeName="r" values="6;14;6" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="80" r="22" fill="none" stroke="#0077c8" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="14;38;14" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>

    <g stroke="#0077c8" stroke-opacity="0.3" stroke-width="1" fill="none">
      <path d="M 30 40 L 100 40 L 100 70"/>
      <path d="M 210 40 L 140 40 L 140 70"/>
      <path d="M 30 120 L 100 120 L 100 95"/>
      <path d="M 210 120 L 140 120 L 140 95"/>
    </g>

    <circle cx="14" cy="14" r="2.5" fill="#7c4dff"/>

    <g fill="#0077c8" opacity="0.85">
      <rect x="-10" y="34" width="10" height="3"/>
      <rect x="-10" y="54" width="10" height="3"/>
      <rect x="-10" y="74" width="10" height="3"/>
      <rect x="-10" y="94" width="10" height="3"/>
      <rect x="-10" y="114" width="10" height="3"/>
      <rect x="240" y="34" width="10" height="3"/>
      <rect x="240" y="54" width="10" height="3"/>
      <rect x="240" y="74" width="10" height="3"/>
      <rect x="240" y="94" width="10" height="3"/>
      <rect x="240" y="114" width="10" height="3"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="8" fill="#005ea3" text-anchor="end">
      <text x="-14" y="38">Fp1</text>
      <text x="-14" y="58">F3</text>
      <text x="-14" y="78">C3</text>
      <text x="-14" y="98">P3</text>
      <text x="-14" y="118">O1</text>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="8" fill="#005ea3">
      <text x="254" y="38">Fp2</text>
      <text x="254" y="58">F4</text>
      <text x="254" y="78">C4</text>
      <text x="254" y="98">P4</text>
      <text x="254" y="118">O2</text>
    </g>
  </g>

  <!-- EEG band scope -->
  <g transform="translate(540 170)">
    <rect x="0" y="0" width="320" height="160" rx="8"
          fill="#ffffff" stroke="#0077c8" stroke-opacity="0.5" stroke-width="1.4"/>
    <g stroke="#0077c8" stroke-opacity="0.10" stroke-width="1">
      <line x1="0"   y1="40"  x2="320" y2="40"/>
      <line x1="0"   y1="80"  x2="320" y2="80"/>
      <line x1="0"   y1="120" x2="320" y2="120"/>
      <line x1="80"  y1="0"   x2="80"  y2="160"/>
      <line x1="160" y1="0"   x2="160" y2="160"/>
      <line x1="240" y1="0"   x2="240" y2="160"/>
    </g>
    <text x="10" y="14"
          font-family="JetBrains Mono, monospace" font-size="9" fill="#005ea3" letter-spacing="2">
      EEG · 4-BAND DECOMPOSITION
    </text>
    <text x="310" y="14" text-anchor="end"
          font-family="JetBrains Mono, monospace" font-size="9" fill="#00873d">● LIVE</text>

    <g transform="translate(60 40)">
      <text x="-52" y="4" font-family="JetBrains Mono, monospace" font-size="9" fill="#0077c8">α 8-13Hz</text>
      <use xlink:href="#alphaWave" stroke="url(#alphaG)" stroke-width="1.6" filter="url(#glow)"/>
      <use xlink:href="#alphaWave" stroke="#0077c8" stroke-width="0.6" opacity="0.5"/>
    </g>
    <g transform="translate(60 78)">
      <text x="-52" y="4" font-family="JetBrains Mono, monospace" font-size="9" fill="#7c4dff">β 13-30Hz</text>
      <use xlink:href="#betaWave" stroke="url(#betaG)" stroke-width="1.4" filter="url(#glow)"/>
      <use xlink:href="#betaWave" stroke="#7c4dff" stroke-width="0.5" opacity="0.5"/>
    </g>
    <g transform="translate(60 114)">
      <text x="-52" y="4" font-family="JetBrains Mono, monospace" font-size="9" fill="#009b7d">θ 4-8Hz</text>
      <use xlink:href="#thetaWave" stroke="url(#thetaG)" stroke-width="1.6" filter="url(#glow)"/>
      <use xlink:href="#thetaWave" stroke="#009b7d" stroke-width="0.5" opacity="0.5"/>
    </g>
    <g transform="translate(60 146)">
      <text x="-52" y="2" font-family="JetBrains Mono, monospace" font-size="9" fill="#b8860b">γ 30-80Hz</text>
      <use xlink:href="#gammaWave" stroke="url(#gammaG)" stroke-width="1.1" filter="url(#glow)"/>
    </g>

    <rect x="0" y="20" width="40" height="130" fill="url(#sweepBar)" opacity="0.7">
      <animate attributeName="x" values="-40;320" dur="3s" repeatCount="indefinite"/>
    </rect>

    <g stroke="#0077c8" stroke-width="1" fill="none">
      <path d="M 4 4 L 14 4 M 4 4 L 4 14"/>
      <path d="M 316 4 L 306 4 M 316 4 L 316 14"/>
      <path d="M 4 156 L 14 156 M 4 156 L 4 146"/>
      <path d="M 316 156 L 306 156 M 316 156 L 316 146"/>
    </g>
  </g>

  <g transform="translate(240 250)" stroke="#005ea3" stroke-width="1.5" fill="none" opacity="0.8">
    <line x1="0"  y1="0" x2="14" y2="0"/>
    <rect x="14" y="-5" width="22" height="10" fill="#ffffff"/>
    <text x="25" y="2" text-anchor="middle"
          font-family="JetBrains Mono, monospace" font-size="6" fill="#005ea3" stroke="none">10k</text>
    <line x1="36" y1="0" x2="50" y2="0"/>
  </g>

  <!-- Title -->
  <g transform="translate(60 130)">
    <text x="0" y="0"
          font-family="JetBrains Mono, Consolas, Menlo, monospace"
          font-size="14" fill="#005ea3">
      <tspan opacity="0.7">~/portfolio$ </tspan><tspan fill="#0077c8">whoami</tspan>
    </text>

    <text x="0" y="70"
          font-family="Inter, 'Segoe UI', system-ui, sans-serif"
          font-weight="900" font-size="68"
          fill="url(#holoTitle)" filter="url(#titleGlow)">Ibrar Ahmad</text>

    <text x="0" y="106"
          font-family="JetBrains Mono, Consolas, Menlo, monospace"
          font-size="16" fill="#005ea3" letter-spacing="2">
      EMBEDDED · BIOSENSOR · PCB SIGNAL INTEGRITY
    </text>

    <g transform="translate(0 130)">
      <g>
        <rect x="0" y="0" width="120" height="26" rx="13"
              fill="#ffffff" stroke="#0077c8" stroke-opacity="0.7"/>
        <text x="60" y="17" text-anchor="middle"
              font-family="JetBrains Mono, monospace" font-size="11" fill="#005ea3">EEG / ECG</text>
      </g>
      <g transform="translate(132 0)">
        <rect x="0" y="0" width="120" height="26" rx="13"
              fill="#ffffff" stroke="#005ea3" stroke-opacity="0.7"/>
        <text x="60" y="17" text-anchor="middle"
              font-family="JetBrains Mono, monospace" font-size="11" fill="#005ea3">8-LAYER PCB</text>
      </g>
      <g transform="translate(264 0)">
        <rect x="0" y="0" width="120" height="26" rx="13"
              fill="#ffffff" stroke="#7c4dff" stroke-opacity="0.7"/>
        <text x="60" y="17" text-anchor="middle"
              font-family="JetBrains Mono, monospace" font-size="11" fill="#7c4dff">FreeRTOS</text>
      </g>
      <g transform="translate(396 0)">
        <rect x="0" y="0" width="120" height="26" rx="13"
              fill="#ffffff" stroke="#0077c8" stroke-opacity="0.7"/>
        <text x="60" y="17" text-anchor="middle"
              font-family="JetBrains Mono, monospace" font-size="11" fill="#005ea3">JTAG / SWD</text>
      </g>
    </g>
  </g>

  <g transform="translate(60 30)"
     font-family="JetBrains Mono, Consolas, Menlo, monospace" font-size="10" fill="#005ea3">
    <rect x="0" y="0" width="220" height="64" rx="6"
          fill="#ffffff" stroke="#0077c8" stroke-opacity="0.5"/>
    <text x="12" y="22">STATUS</text>
    <text x="92" y="22" fill="#00873d">● ONLINE</text>
    <text x="12" y="40">SIGNAL</text>
    <g transform="translate(92 32)">
      <rect x="0" y="0" width="110" height="10" fill="#eaf2ff" stroke="#0077c8" stroke-opacity="0.5"/>
      <rect x="2" y="2" width="0" height="6" fill="#0077c8">
        <animate attributeName="width" values="0;106;30;106" dur="3.2s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="12" y="58">MODE  <tspan fill="#7c4dff">CREATIVE</tspan></text>
  </g>
</svg>

name: Update Recent Activity

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/activity.yml"
      - ".github/scripts/update-activity.mjs"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Render activity into README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME:  hiibrarahmad
          MAX_LINES:    "8"
          TARGET_FILE:  README.md
        run: node .github/scripts/update-activity.mjs

      - name: Commit & push if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore(readme): refresh recent activity"

            # Race-safe push
            attempt=0
            until [ $attempt -ge 5 ]; do
              attempt=$((attempt+1))
              if git push origin main; then
                echo "pushed on attempt $attempt"
                break
              fi
              echo "push failed, rebasing then retry"
              git pull --rebase origin main
              sleep $((attempt * 3))
            done
          else
            echo "no README changes"
          fi

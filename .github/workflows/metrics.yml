name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # refresh every 6h
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------
  # 1) Main classic stats card with isometric calendar, langs, etc.
  # ----------------------------------------------------------------
  classic:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: hiibrarahmad
          filename: metrics.classic.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          config_padding: 0, 8 + 6%
          config_display: large
          config_animations: yes

          # Isometric calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Activity timeline
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_visibility: public

          # Languages with detail
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_limit: 8
          plugin_languages_threshold: 1%

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 12

          # Followup stats line
          plugin_followup: yes

      - name: Move SVG into assets/metrics/
        run: |
          mkdir -p assets/metrics
          mv metrics.classic.svg assets/metrics/metrics.classic.svg

      - name: Publish to output branch
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/metrics
          mv assets/metrics/metrics.classic.svg /tmp/metrics/

          git fetch origin output || true
          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git checkout output
            git pull --rebase origin output || true
          else
            git checkout --orphan output
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p assets/metrics
          mv /tmp/metrics/metrics.classic.svg assets/metrics/metrics.classic.svg

          git add assets/metrics/metrics.classic.svg
          if git diff --quiet --cached; then
            echo "no metrics.classic changes"
          else
            git commit -m "chore(metrics): refresh classic card"
            git push origin output
          fi

  # ----------------------------------------------------------------
  # 2) Terminal-style "habits" card
  # ----------------------------------------------------------------
  terminal:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: hiibrarahmad
          filename: metrics.terminal.svg
          template: terminal
          base: ""

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic

          plugin_lines: yes
          plugin_lines_history_limit: 1

      - name: Move SVG into assets/metrics/
        run: |
          mkdir -p assets/metrics
          mv metrics.terminal.svg assets/metrics/metrics.terminal.svg

      - name: Publish to output branch
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/metrics
          mv assets/metrics/metrics.terminal.svg /tmp/metrics/

          git fetch origin output || true
          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git checkout output
            git pull --rebase origin output || true
          else
            git checkout --orphan output
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p assets/metrics
          mv /tmp/metrics/metrics.terminal.svg assets/metrics/metrics.terminal.svg

          git add assets/metrics/metrics.terminal.svg
          if git diff --quiet --cached; then
            echo "no metrics.terminal changes"
          else
            git commit -m "chore(metrics): refresh terminal card"
            git push origin output
          fi

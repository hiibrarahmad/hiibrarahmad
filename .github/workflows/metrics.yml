name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # refresh every 6h
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------
  # 1) Classic card → assets/metrics/metrics.classic.svg on `output`
  # ----------------------------------------------------------------
  classic:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: hiibrarahmad
          filename: assets/metrics/metrics.classic.svg
          committer_branch: output
          committer_message: "chore(metrics): refresh classic card"
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          config_padding: 0, 8 + 6%
          config_display: large
          config_animations: yes
          retries: 3
          retries_delay: 30

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_visibility: public

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_limit: 8
          plugin_languages_threshold: 1%

          # achievements plugin disabled — it depends on Projects-classic
          # which GitHub deprecated. Re-enable when lowlighter/metrics ships
          # a fix. See: https://github.blog/changelog/2024-05-23-sunset-notice-projects-classic/

          plugin_followup: yes
          plugin_followup_sections: repositories, user

          # Most-starred repos showcase (replaces achievements visually)
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # Stargazers chart for top repo
          plugin_stargazers: yes
          plugin_stargazers_charts_type: graph

  # ----------------------------------------------------------------
  # 2) Terminal habits card → assets/metrics/metrics.terminal.svg
  # ----------------------------------------------------------------
  terminal:
    runs-on: ubuntu-latest
    needs: classic
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: hiibrarahmad
          filename: assets/metrics/metrics.terminal.svg
          committer_branch: output
          committer_message: "chore(metrics): refresh terminal card"
          template: terminal
          base: ""
          retries: 3
          retries_delay: 30

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic

          plugin_lines: yes
          plugin_lines_history_limit: 1
